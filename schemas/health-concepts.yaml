    fields:
      name:
        aliases: [medication, drug_name, med_name]
        unit: null
        type: string
      taken:
        aliases: [administered, completed]
        unit: null
        type: boolean
      time:
        aliases: [taken_at, administered_at]
        unit: null
        type: string
      dose:
        aliases: [dosage, amount]
        unit: null
        type: string
    producers:
      - skill: medication-reminder
        record_type: dose
    consumers:
      - medication-reminder

  # ── Lab Results ────────────────────────────────────────────

  kidney-function:
    canonical_type: kidney_function
    domain: health
    category: lab_results
    display_name: "Kidney Function"
    display_name_zh: "肾功能"
    loinc: "24362-6"  # Renal function panel
    description: "Kidney function lab results"
    fields:
      creatinine:
        aliases: [cr, scr]
        unit: µmol/L
        loinc: "2160-0"
        range: [10, 2000]
        type: number
      egfr:
        aliases: [gfr]
        unit: mL/min/1.73m²
        loinc: "48642-3"
        range: [0, 200]
        type: number
      bun:
        aliases: [urea, urea_nitrogen]
        unit: mmol/L
        loinc: "3094-0"
        range: [0, 100]
        type: number
      uric_acid:
        aliases: [ua]
        unit: µmol/L
        loinc: "3084-1"
        range: [0, 1500]
        type: number
    producers: []
    consumers:
      - chronic-condition-monitor

  liver-function:
    canonical_type: liver_function
    domain: health
    category: lab_results
    display_name: "Liver Function"
    display_name_zh: "肝功能"
    loinc: "24325-3"  # Hepatic function panel
    description: "Liver function lab results"
    fields:
      alt:
        aliases: [sgpt, alanine_aminotransferase]
        unit: U/L
        loinc: "1742-6"
        range: [0, 5000]
        type: number
      ast:
        aliases: [sgot, aspartate_aminotransferase]
        unit: U/L
        loinc: "1920-8"
        range: [0, 5000]
        type: number
      total_bilirubin:
        aliases: [tbil, bilirubin]
        unit: µmol/L
        loinc: "1975-2"
        range: [0, 1000]
        type: number
      albumin:
        aliases: [alb]
        unit: g/L
        loinc: "1751-7"
        range: [0, 100]
        type: number
    producers: []
    consumers:
      - chronic-condition-monitor

  blood-lipids:
    canonical_type: blood_lipids
    domain: health
    category: lab_results
    display_name: "Blood Lipids"
    display_name_zh: "血脂"
    loinc: "57698-3"  # Lipid panel
    description: "Blood lipid panel results"
    fields:
      total_cholesterol:
        aliases: [tc, cholesterol]
        unit: mmol/L
        loinc: "2093-3"
        range: [0, 30]
        type: number
      ldl:
        aliases: [ldl_c, low_density]
        unit: mmol/L
        loinc: "2089-1"
        range: [0, 20]
        type: number
      hdl:
        aliases: [hdl_c, high_density]
        unit: mmol/L
        loinc: "2085-9"
        range: [0, 10]
        type: number
      triglycerides:
        aliases: [tg]
        unit: mmol/L
        loinc: "2571-8"
        range: [0, 50]
        type: number
    producers: []
    consumers:
      - chronic-condition-monitor

  tumor-markers:
    canonical_type: tumor_markers
    domain: health
    category: lab_results
    display_name: "Tumor Markers"
    display_name_zh: "肿瘤标志物"
    loinc: null
    description: "Tumor marker lab results"
    fields:
      afp:
        aliases: [alpha_fetoprotein]
        unit: ng/mL
        loinc: "1834-1"
        range: [0, 10000]
        type: number
      cea:
        aliases: [carcinoembryonic_antigen]
        unit: ng/mL
        loinc: "2039-6"
        range: [0, 5000]
        type: number
      ca199:
        aliases: [ca_19_9]
        unit: U/mL
        loinc: "24108-3"
        range: [0, 10000]
        type: number
      psa:
        aliases: [prostate_specific_antigen]
        unit: ng/mL
        loinc: "2857-1"
        range: [0, 1000]
        type: number
    producers: []
    consumers: []

  # ── Operational (non-clinical) ─────────────────────────────

  weekly-digest:
    canonical_type: digest
    domain: health
    category: operational
    display_name: "Weekly Health Digest"
    display_name_zh: "健康周报"
    loinc: null
    description: "Weekly aggregated health summary"
    fields:
      week_start:
        aliases: []
        unit: null
        type: string
      week_end:
        aliases: []
        unit: null
        type: string
      metrics:
        aliases: []
        unit: null
        type: object
      content:
        aliases: []
        unit: null
        type: string
    producers:
      - skill: weekly-health-digest
        record_type: digest
    consumers:
