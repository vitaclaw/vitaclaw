    fields:
      drink:
        aliases: [beverage, source]
        unit: null
        type: string
      mg:
        aliases: [caffeine_mg, amount, milligrams]
        unit: mg
        range: [0, 2000]
        type: number
      time:
        aliases: [intake_time]
        unit: null
        type: string
    producers:
      - skill: caffeine-tracker
        record_type: intake
    consumers:
      - caffeine-tracker
      - caffeine-sleep-advisor

  supplement-dose:
    canonical_type: dose_log
    domain: health
    category: nutrition
    display_name: "Supplement Dose"
    display_name_zh: "补剂服用"
    loinc: null
    description: "Supplement dose taken record"
    fields:
      supplement:
        aliases: [name, supplement_name]
        unit: null
        type: string
      taken:
        aliases: [completed]
        unit: null
        type: boolean
      time:
        aliases: [taken_at]
        unit: null
        type: string
    producers:
      - skill: supplement-manager
        record_type: dose_log
    consumers:
      - supplement-manager

  supplement:
    canonical_type: supplement
    domain: health
    category: nutrition
    display_name: "Supplement Regimen"
    display_name_zh: "补剂方案"
    loinc: null
    description: "Active supplement in regimen"
    fields:
      name:
        aliases: [supplement_name]
        unit: null
        type: string
      dose:
        aliases: [dosage, amount]
        unit: null
        type: string
      timing:
        aliases: [schedule, time]
        unit: null
        type: string
      status:
        aliases: []
        unit: null
        type: string
        enum: [active, paused, discontinued]
    producers:
      - skill: supplement-manager
        record_type: supplement
    consumers:
      - supplement-manager

  # ── Medication ─────────────────────────────────────────────

  medication-dose:
    canonical_type: dose
    domain: health
    category: medication
    display_name: "Medication Dose"
    display_name_zh: "药物服用"
    loinc: null
