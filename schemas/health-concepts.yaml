  monthly-digest:
    canonical_type: monthly_digest
    domain: health
    category: operational
    display_name: "Monthly Health Digest"
    display_name_zh: "健康月报"
    loinc: null
    description: "Monthly aggregated health summary"
    fields:
      month:
        aliases: []
        unit: null
        type: string
      month_start:
        aliases: []
        unit: null
        type: string
      month_end:
        aliases: []
        unit: null
        type: string
      metrics:
        aliases: []
        unit: null
        type: object
      content:
        aliases: []
        unit: null
        type: string
    producers:
      - skill: weekly-health-digest
        record_type: monthly_digest
    consumers:
      - health-operations

  operations-run:
    canonical_type: operations_run
    domain: health
    category: operational
    display_name: "Health Operations Run"
    display_name_zh: "健康运维记录"
    loinc: null
    description: "Automated health operations execution record"
    fields:
      date:
        aliases: []
        unit: null
        type: string
      generated_weekly:
        aliases: []
        unit: null
