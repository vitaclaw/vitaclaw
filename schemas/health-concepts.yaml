# VitaClaw Health Concepts Registry
# ===================================
# Single source of truth for all health concepts across skills.
# Each concept defines: canonical type, LOINC coding, field schema,
# aliases, units, plausible ranges, and producer/consumer skills.
#
# Design: domain-agnostic envelope supports future cognitive/social domains.
# v1 focuses on health domain only.

version: "1.0.0"

# Concept definitions keyed by canonical concept ID
concepts:

  # ── Vital Signs ──────────────────────────────────────────────

  blood-pressure:
    canonical_type: bp
    domain: health
    category: vital_signs
    display_name: "Blood Pressure"
    display_name_zh: "血压"
    loinc: "85354-9"  # Blood pressure panel
    description: "Systolic and diastolic blood pressure measurement"
    fields:
      systolic:
        aliases: [sys, sbp]
        unit: mmHg
        loinc: "8480-6"
        range: [40, 300]
        type: integer
      diastolic:
        aliases: [dia, dbp]
        unit: mmHg
        loinc: "8462-4"
        range: [20, 200]
        type: integer
      heart_rate:
        aliases: [hr, pulse]
        unit: bpm
        loinc: "8867-4"
        range: [20, 300]
        type: integer
      grade:
        aliases: []
        unit: null
        type: string
        enum: [normal, elevated, grade1, grade2, grade3, crisis]
      context:
        aliases: [setting]
        unit: null
        type: string
        enum: [home, clinic, ambulatory, ""]
      arm:
        aliases: []
        unit: null
        type: string
        enum: [left, right, ""]
      position:
        aliases: [posture]
        unit: null
        type: string
        enum: [sitting, standing, supine, ""]
    producers:
      - skill: blood-pressure-tracker
        record_type: bp
      - skill: chronic-condition-monitor
        record_type: bp
      - skill: apple-health-digest
        record_type: bp
    consumers:
      - blood-pressure-tracker
      - chronic-condition-monitor
      - hypertension-daily-copilot
      - health-heartbeat

  heart-rate:
    canonical_type: heart_rate
    domain: health
    category: vital_signs
    display_name: "Heart Rate"
    display_name_zh: "心率"
    loinc: "8867-4"
    description: "Resting or measured heart rate"
    fields:
      value:
        aliases: [bpm, hr, rate]
        unit: bpm
        loinc: "8867-4"
        range: [20, 300]
        type: integer
      context:
        aliases: [setting]
        unit: null
        type: string
        enum: [resting, active, sleeping, ""]
      source:
        aliases: []
        unit: null
        type: string
    producers:
      - skill: wearable-analysis-agent
        record_type: heart_rate
      - skill: apple-health-digest
        record_type: heart_rate
    consumers:
      - health-heartbeat

  heart-rate-variability:
    canonical_type: hrv
    domain: health
    category: vital_signs
    display_name: "Heart Rate Variability"
    display_name_zh: "心率变异性"
    loinc: "80404-7"
    description: "HRV measurement (SDNN or RMSSD)"
    fields:
      sdnn:
        aliases: []
        unit: ms
        range: [0, 500]
        type: number
      rmssd:
        aliases: []
        unit: ms
        range: [0, 500]
        type: number
      context:
        aliases: []
        unit: null
        type: string
    producers:
      - skill: wearable-analysis-agent
        record_type: hrv
    consumers:
      - health-heartbeat

  temperature:
    canonical_type: temperature
    domain: health
    category: vital_signs
    display_name: "Body Temperature"
    display_name_zh: "体温"
    loinc: "8310-5"
    description: "Body temperature measurement"
    fields:
      value:
        aliases: [temp, celsius]
        unit: "°C"
        loinc: "8310-5"
        range: [30.0, 45.0]
        type: number
      method:
        aliases: []
        unit: null
        type: string
        enum: [oral, axillary, tympanic, rectal, forehead, ""]
    producers: []
    consumers: []

  spo2:
    canonical_type: spo2
    domain: health
    category: vital_signs
    display_name: "Blood Oxygen Saturation"
    display_name_zh: "血氧饱和度"
    loinc: "2708-6"
    description: "Peripheral oxygen saturation (SpO2)"
    fields:
      value:
        aliases: [spo2, oxygen]
        unit: "%"
        loinc: "2708-6"
        range: [50, 100]
        type: number
    producers:
      - skill: apple-health-digest
        record_type: spo2
    consumers: []

  # ── Metabolic ──────────────────────────────────────────────

  blood-sugar:
    canonical_type: glucose
    domain: health
    category: metabolic
    display_name: "Blood Glucose"
    display_name_zh: "血糖"
    loinc: "15074-8"  # Glucose [Moles/volume] in Blood
    description: "Blood glucose measurement"
    fields:
      value:
        aliases: [glucose, blood_sugar, level]
        unit: mmol/L
        loinc: "15074-8"
        range: [0.5, 50.0]
        type: number
      context:
        aliases: [timing, meal_relation]
        unit: null
        type: string
        enum: [fasting, pre_meal, post_meal, random, bedtime, ""]
    producers:
      - skill: chronic-condition-monitor
        record_type: glucose
    consumers:
      - chronic-condition-monitor
      - diabetes-control-hub
      - health-heartbeat

  weight:
    canonical_type: weight
    domain: health
    category: metabolic
    display_name: "Body Weight"
    display_name_zh: "体重"
    loinc: "29463-7"
    description: "Body weight measurement"
    fields:
      kg:
        aliases: [weight, value]
        unit: kg
        loinc: "29463-7"
        range: [1, 500]
        type: number
      height_cm:
        aliases: [height]
        unit: cm
        range: [30, 300]
        type: number
      bmi:
        aliases: []
        unit: kg/m²
        loinc: "39156-5"
        range: [5, 100]
        type: number
      context:
        aliases: []
        unit: null
        type: string
    producers:
      - skill: chronic-condition-monitor
        record_type: weight
      - skill: apple-health-digest
        record_type: weight
    consumers:
      - chronic-condition-monitor
      - health-heartbeat

  # ── Sleep ──────────────────────────────────────────────────

  sleep:
    canonical_type: sleep_session
    domain: health
    category: sleep
    display_name: "Sleep Session"
    display_name_zh: "睡眠"
    loinc: "93832-4"  # Sleep duration
    description: "Sleep session data including stages and quality"
    fields:
      score:
        aliases: [sleep_score, quality_score]
        unit: null
        range: [0, 100]
        type: integer
      total_min:
        aliases: [duration_min, total_minutes, sleep_duration]
        unit: min
        range: [0, 1440]
        type: integer
      efficiency_pct:
        aliases: [efficiency, sleep_efficiency]
        unit: "%"
        range: [0, 100]
        type: number
      deep_min:
        aliases: [deep_sleep_min, deep]
        unit: min
        range: [0, 600]
        type: integer
      light_min:
        aliases: [light_sleep_min, light]
        unit: min
        range: [0, 900]
        type: integer
      rem_min:
        aliases: [rem_sleep_min, rem]
        unit: min
        range: [0, 600]
        type: integer
      awake_min:
        aliases: [awake, awakenings_min]
        unit: min
        range: [0, 600]
        type: integer
      bedtime:
        aliases: [sleep_onset, time_asleep]
        unit: null
        type: string
      wake_time:
        aliases: [time_awake, wakeup]
        unit: null
        type: string
      date:
        aliases: [night_of]
        unit: null
        type: string
    producers:
      - skill: sleep-analyzer
        record_type: sleep_session
      - skill: apple-health-digest
        record_type: sleep_session
    consumers:
      - sleep-analyzer
      - caffeine-sleep-advisor
      - health-heartbeat

  # ── Nutrition & Supplements ────────────────────────────────

  caffeine:
    canonical_type: intake
    domain: health
    category: nutrition
    display_name: "Caffeine Intake"
    display_name_zh: "咖啡因摄入"
    loinc: null
